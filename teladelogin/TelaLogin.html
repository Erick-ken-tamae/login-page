<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="../teladelogin/TelaLogin.css">
</head>
<body>

  <div class="login-container">
    <h1>Login</h1>

    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Senha" required>

      <button type="submit">Entrar</button>
    </form>

    <p id="message"></p>
  </div>

  <script src="../teladelogin/TelaLogin.js"></script>
</body>
</html>
