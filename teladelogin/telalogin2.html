<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="../teladelogin/telalogin2.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <title>Tela Login</title>
</head>
<body>

    <div class="container" id="container">
        <div class="form-container sign-up">
            <form action="">
                <h1>Creat Account</h1>

                <div class="social-icons">
                    <a href="#" class="icon">
                        <i class="fa-brands fa-google-plus-g"></i> 
                    </a>
                    <a href="#" class="icon">
                        <i class="fa-brands fa-facebook-f"></i> 
                    </a>
                    <a href="#" class="icon">
                        <i class="fa-brands fa-github"></i> 
                    </a>
                    <a href="#" class="icon">
                        <i class="fa-brands fa-linkedin-in"></i> 
                    </a>
                </div>
                <span> or use your email Password</span>
                <input type="email" placeholder="Email">
                <input type="Password" placeholder="Password">
                <a href="#">Forget Your Password?</a>
                <button>Sign Up</button>
            </form>
        </div>
        <div class="form-container sign-in">
            <form action="">
                <h1>Sign In</h1>

                <div class="social-icons">
                    <a href="#" class="icon">
                        <i class="fa-brands fa-google-plus-g"></i> 
                    </a>
                    <a href="#" class="icon">
                        <i class="fa-brands fa-facebook-f"></i> 
                    </a>
                    <a href="#" class="icon">
                        <i class="fa-brands fa-github"></i> 
                    </a>
                    <a href="#" class="icon">
                        <i class="fa-brands fa-linkedin-in"></i> 
                    </a>
                </div>
                <span> or use your email Password</span>
                <input type="email" placeholder="Email">
                <input type="Password" placeholder="Password">
                <a href="#">Forget Your Password?</a>
                <button>Sign In</button>
            </form>
        </div>
        <div class="toggle-container">
            <div class="toggle">
                <div class="toggle-panel 
                toggle-left">
                <h1>Welcome Back!</h1>
                <p>Enter Your Personal details
                    to use all of site features
                </p>
                <button class="hidden" 
                id="login">Sign In</button>
                </div>
                <div class="toggle-panel toggle-right">
                <h1>Hello, Friend!</h1>
                <p>Register with Your Personal details
                to use all of site features</p>
                <button class="hidden" 
                id="register">Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../teladelogin/telalogin2.js"></script>
</body>
</html>
